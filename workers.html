<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and find skilled welding workers near your location. Filter by welding type, price range, and availability.">
  <title>Find Welding Workers | WeldPro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">⚡</div>
        <span>WeldPro</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="workers.html" class="active">Find Workers</a>
        <a href="booking.html">Book Now</a>
        <a href="dashboard.html">My Bookings</a>
      </div>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-primary btn-sm">Register as Worker</a>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <div class="section-header" style="margin-bottom: 32px;">
        <span class="section-tag">Browse Workers</span>
        <h1 class="section-title">Find Skilled Welders Near You</h1>
        <p class="section-subtitle">Search from our network of certified welding professionals</p>
      </div>

      <!-- SEARCH & FILTER -->
      <div class="search-filter-bar" id="searchFilter">
        <div class="filter-group">
          <label>📍 Location</label>
          <input type="text" id="filterLocation" placeholder="Enter city or area..." />
        </div>
        <div class="filter-group">
          <label>🔧 Welding Type</label>
          <select id="filterType">
            <option value="">All Types</option>
            <option value="MIG">MIG Welding</option>
            <option value="TIG">TIG Welding</option>
            <option value="Stick">Stick Welding</option>
            <option value="Pipe">Pipe Welding</option>
            <option value="Structural">Structural Welding</option>
            <option value="Underwater">Underwater Welding</option>
          </select>
        </div>
        <div class="filter-group">
          <label>💰 Max Rate (₹/hr)</label>
          <select id="filterPrice">
            <option value="">Any Price</option>
            <option value="400">Up to ₹400</option>
            <option value="500">Up to ₹500</option>
            <option value="700">Up to ₹700</option>
            <option value="1000">Up to ₹1,000</option>
            <option value="99999">₹1,000+</option>
          </select>
        </div>
        <div class="filter-group" style="flex: 0 0 auto;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="filterWorkers()">Search</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SORT BAR & RESULTS -->
  <div class="container">
    <div class="sort-bar">
      <span class="results-count" id="resultsCount">Showing 8 workers</span>
      <div class="sort-options">
        <button class="sort-btn active" data-sort="rating" onclick="sortWorkers('rating', this)">⭐ Top Rated</button>
        <button class="sort-btn" data-sort="price-low" onclick="sortWorkers('price-low', this)">💰 Price: Low</button>
        <button class="sort-btn" data-sort="price-high" onclick="sortWorkers('price-high', this)">💎 Price: High</button>
        <button class="sort-btn" data-sort="experience" onclick="sortWorkers('experience', this)">📈 Experience</button>
      </div>
    </div>

    <!-- WORKERS GRID -->
    <div class="workers-grid" id="workersGrid">
      <!-- Workers rendered by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 WeldPro. All rights reserved.</span>
        <div class="footer-social">
          <a href="#" aria-label="Facebook">f</a>
          <a href="#" aria-label="Twitter">𝕏</a>
          <a href="#" aria-label="Instagram">📷</a>
          <a href="#" aria-label="LinkedIn">in</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/firebase-init.js"></script>
  <script src="js/app.js"></script>
  <script src="js/workers.js"></script>
</body>
</html>
